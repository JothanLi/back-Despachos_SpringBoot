apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-despachos
  namespace: innovatech
spec:
  serviceName: mysql-despachos
  replicas: 1
  selector:
    matchLabels:
      app: mysql-despachos
  template:
    metadata:
      labels:
        app: mysql-despachos
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: mysql-despachos
          image: mysql:8.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
          envFrom:
            - secretRef:
                name: mysql-despachos-secret
          volumeMounts:
            - name: mysql-despachos-data
              mountPath: /var/lib/mysql
          startupProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h 127.0.0.1 -uroot -p$MYSQL_ROOT_PASSWORD --silent"]
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h 127.0.0.1 -uroot -p$MYSQL_ROOT_PASSWORD --silent"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h 127.0.0.1 -uroot -p$MYSQL_ROOT_PASSWORD --silent"]
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
  volumeClaimTemplates:
    - metadata:
        name: mysql-despachos-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

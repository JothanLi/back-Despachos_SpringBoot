services:
  mysql-despachos:
    image: mysql:8.4
    container_name: mysql-despachos
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-despachosdb}
      MYSQL_USER: ${MYSQL_USER:-despachosuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-despachospass123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass123}
    ports:
      - "3308:3306"
    volumes:
      - despachos_mysql_data:/var/lib/mysql
    networks:
      - despachos-net
    restart: unless-stopped

  backend-despachos:
    build: .
    image: ${DOCKERHUB_USERNAME:-local}/backend-despachos:latest
    container_name: backend-despachos
    depends_on:
      - mysql-despachos
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-despachos:3306/${MYSQL_DATABASE:-despachosdb}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-despachosuser}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-despachospass123}
    ports:
      - "8082:8081"
    networks:
      - despachos-net
    restart: unless-stopped

volumes:
  despachos_mysql_data:
    name: despachos_mysql_data

networks:
  despachos-net:
    name: despachos-net
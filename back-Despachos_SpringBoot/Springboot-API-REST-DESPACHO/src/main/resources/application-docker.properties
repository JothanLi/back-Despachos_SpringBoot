server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql-despachos:3306/despachosdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:despachosuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:despachospass}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

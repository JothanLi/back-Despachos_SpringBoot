name: Deploy Backend Despachos with SSM

on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: backend-despachos
      APP_DIR: /home/ec2-user/backend-despachos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          file: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backend-despachos:latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create SSM parameters file
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: |
          python3 <<'PY'
          import json
          import os

          dockerhub_username = os.environ["DOCKERHUB_USERNAME"]
          dockerhub_token = os.environ["DOCKERHUB_TOKEN"]
          mysql_database = os.environ["MYSQL_DATABASE"]
          mysql_user = os.environ["MYSQL_USER"]
          mysql_password = os.environ["MYSQL_PASSWORD"]
          mysql_root_password = os.environ["MYSQL_ROOT_PASSWORD"]

          compose = f"""services:
            mysql-despachos:
              image: mysql:8.4
              container_name: mysql-despachos
              environment:
                MYSQL_DATABASE: {mysql_database}
                MYSQL_USER: {mysql_user}
                MYSQL_PASSWORD: {mysql_password}
                MYSQL_ROOT_PASSWORD: {mysql_root_password}
              volumes:
                - despachos_mysql_data:/var/lib/mysql
              networks:
                - despachos-net
              restart: unless-stopped

            backend-despachos:
              image: {dockerhub_username}/backend-despachos:latest
              container_name: backend-despachos
              depends_on:
                - mysql-despachos
              environment:
                DB_ENDPOINT: mysql-despachos
                DB_PORT: 3306
                DB_NAME: {mysql_database}
                DB_USERNAME: {mysql_user}
                DB_PASSWORD: {mysql_password}
              ports:
                - "8082:8080"
              networks:
                - despachos-net
              restart: unless-stopped

          volumes:
            despachos_mysql_data:
              name: despachos_mysql_data

          networks:
            despachos-net:
              name: despachos-net
          """

          commands = [
              "mkdir -p /home/ec2-user/backend-despachos",
              "cat > /home/ec2-user/backend-despachos/docker-compose.prod.yml <<'EOF'\n" + compose + "\nEOF",
              "cd /home/ec2-user/backend-despachos",
              f"echo '{dockerhub_token}' | docker login -u '{dockerhub_username}' --password-stdin",
              "docker compose -f docker-compose.prod.yml pull",
              "docker compose -f docker-compose.prod.yml up -d",
              "docker image prune -f",
              "docker ps"
          ]

          with open("ssm-params.json", "w", encoding="utf-8") as f:
              json.dump({"commands": commands}, f)
          PY

      - name: Deploy to EC2 Backend with SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Backend Despachos" \
            --parameters file://ssm-params.json \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}" \
            --output text